<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>b5</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }
        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 70%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #e9e9e9;
        }
        button {
            padding: 8px 12px;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            border-bottom: 1px solid #eee;
            margin-top: 10px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
        }
        .deleteBtn {
            background: red;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Danh sách nhiệm vụ</h2>
        <input type="text" id="taskInput" placeholder="Nhập nhiệm vụ...">
        <button onclick="addTask()">Thêm</button>
        <ul id="taskList"></ul>
    </div>
    <script>
        function addTask() {
            let task = document.getElementById("taskInput").value;
            if (task === "") {
                alert("Nhiệm vụ không được để trống!");
                return;
            }
            let li = document.createElement("li");
            li.innerText = task;
            let deleteBtn = document.createElement("button");
            deleteBtn.innerText = "X";
            deleteBtn.className = "deleteBtn";
            deleteBtn.onclick = function () {
                let confirmDelete = confirm("Bạn có chắc muốn xóa nhiệm vụ này?");
                if (confirmDelete) {
                    li.remove();
                }
            };
            li.appendChild(deleteBtn);
            document.getElementById("taskList").appendChild(li);
            document.getElementById("taskInput").value = "";
        }
    </script>
</body>
</html>
