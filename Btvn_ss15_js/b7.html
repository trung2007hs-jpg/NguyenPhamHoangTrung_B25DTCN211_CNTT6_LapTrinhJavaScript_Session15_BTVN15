<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>b7</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        /* ảnh nhỏ */
        .gallery img {
            width: 150px;
            margin: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* nền tối khi phóng to */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* ảnh lớn */
        .overlay img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2>Click ảnh để phóng to</h2>
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/400/300">
        <img src="https://picsum.photos/id/1016/400/300">
        <img src="https://picsum.photos/id/1018/400/300">
    </div>
    <div class="overlay" id="overlay">
        <img id="bigImg">
    </div>
    <script>
        let images = document.querySelectorAll(".gallery img")
        let overlay = document.getElementById("overlay")
        let bigImg = document.getElementById("bigImg")
        images.forEach(img => {
            img.onclick = function () {
                bigImg.src = this.src
                overlay.style.display = "flex"
            }
        })
        overlay.onclick = function () {
            overlay.style.display = "none"
        }
    </script>
</body>
</html>
