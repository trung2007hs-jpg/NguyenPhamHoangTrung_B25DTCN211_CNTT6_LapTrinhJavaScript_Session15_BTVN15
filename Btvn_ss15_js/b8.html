<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>To-Do List K24</title>
    <style>
        body {
            font-family: Arial;
            background: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .input-box {
            margin: 20px;
        }

        .task {
            width: 420px;
            margin: 10px auto;
            background: #ddd;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actions button {
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <h2>To-Do List K24</h2>
    <div class="input-box">
        <input id="taskInput" placeholder="Nhập công việc">
        <button onclick="addTask()">Thêm</button>
    </div>
    <div id="taskList"></div>
    <script>
        let tasks = []
        function render() {
            let list = document.getElementById("taskList")
            list.innerHTML = ""
            tasks.forEach((task, index) => {
                list.innerHTML += `
                <div class="task">
                    <span>${task}</span>
                    <div class="actions">
                        <button onclick="editTask(${index})">Sửa</button>
                        <button onclick="deleteTask(${index})">Xóa</button>
                    </div>
                </div>
            `})
        }
        function addTask() {
            let input = document.getElementById("taskInput")
            let value = input.value.trim()
            if (value === "") {
                alert("Vui lòng nhập công việc")
                return
            }
            tasks.push(value)
            input.value = ""
            render()
        }
        function editTask(index) {
            let newTask = prompt("Sửa công việc:", tasks[index])
            if (newTask === null) {
                return
            }
            if (newTask.trim() === "") {
                alert("Không được để trống")
                return
            }
            tasks[index] = newTask
            render()
        }

        function deleteTask(index) {
            let check = confirm("Bạn có chắc muốn xóa không?")
            if (check) {
                tasks.splice(index, 1)
                render()
            }
        }
    </script>
</body>
</html>
