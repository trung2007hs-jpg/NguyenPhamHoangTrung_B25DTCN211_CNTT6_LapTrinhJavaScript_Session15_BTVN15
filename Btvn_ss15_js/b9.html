<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Progress Bar</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        /* khung progress */
        .progress-container {
            width: 400px;
            height: 35px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }

        /* thanh tiến trình */
        .progress-bar {
            height: 100%;
            width: 0%;
            background: rgb(0, 255, 0);
            transition: width 0.4s ease;
        }

        /* text % luôn ở giữa */
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: black;
        }

        /* nút */
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h2>Progress Bar</h2>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
        <div class="progress-text" id="text">0%</div>
    </div>
    <button onclick="increase()">Tăng tiến trình</button>
    <button onclick="decrease()">Giảm tiến trình</button>
    <script>
        let progress = 0
        let bar = document.getElementById("bar")
        let text = document.getElementById("text")
        function render() {
            bar.style.width = progress + "%"
            text.innerText = progress + "%"
        }
        function increase() {
            if (progress < 100) {
                progress += 10
            }
            render()
        }
        function decrease() {
            if (progress > 0) {
                progress -= 10
            }
            render()
        }
    </script>
</body>
</html>
